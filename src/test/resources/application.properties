# Test config — disables real infrastructure for unit tests
spring.profiles.active=test
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=false

spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.cache.type=none

spring.autoconfigure.exclude=\
  org.springframework.ai.vectorstore.pgvector.autoconfigure.PgVectorStoreAutoConfiguration

gemini.api.key=test-key
gemini.api.base-url=https://generativelanguage.googleapis.com/v1beta
gemini.api.model=models/gemini-embedding-001

jwt.secret=your_local_development_jwt_secret_key_change_in_prod
jwt.expiration-ms=86400000